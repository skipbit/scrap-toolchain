name: Index Update

# Trigger: ingot-cast completion (any conclusion) or manual dispatch.
# Runs on all conclusions including 'failure' because metadata-only changes
# (e.g., status: deprecated) skip ingot builds but still need index reflection.
on:
  workflow_run:
    workflows: ['Ingot Cast']
    types: [completed]
  workflow_dispatch:

concurrency:
  group: index-update
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

jobs:
  update-index:
    runs-on: ubuntu-24.04
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Download artifacts from the triggering ingot-cast run.
      # continue-on-error handles expected scenarios where no artifacts exist:
      #   - ingot-cast skipped builds (DD-07: metadata-only changes)
      #   - ingot-cast failed before upload-release
      #   - Artifacts expired (retention-days: 3)
      # In all cases, generate-index.sh falls back to GitHub Releases API (DD-09).
      - name: Download artifacts
        if: github.event_name == 'workflow_run'
        id: download-artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: artifacts/
          merge-multiple: true

      - name: Report artifact status
        if: github.event_name == 'workflow_run'
        run: |
          if [[ "${{ steps.download-artifacts.outcome }}" == "success" ]]; then
            echo "Artifacts downloaded from run ${{ github.event.workflow_run.id }}"
            find artifacts/ -type f -name '*.json' | sort
          else
            echo "No artifacts available (outcome: ${{ steps.download-artifacts.outcome }})"
            echo "generate-index.sh will use GitHub Releases API fallback"
          fi

      - name: Generate index
        env:
          ARTIFACT_DIR: ${{ github.event_name == 'workflow_run' && steps.download-artifacts.outcome == 'success' && 'artifacts' || '' }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          chmod +x scripts/generate-index.sh
          scripts/generate-index.sh

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [[ -z "$(git status --porcelain -- index.toml)" ]]; then
            echo "No changes to index.toml"
            exit 0
          fi

          git config user.name "scrap-toolchain-ci[bot]"
          git config user.email "scrap-toolchain-ci[bot]@users.noreply.github.com"

          git add index.toml
          git commit -m "chore: update index.toml"

          MAX_RETRIES=3
          for attempt in $(seq 1 "$MAX_RETRIES"); do
            if git push; then
              echo "Successfully pushed (attempt ${attempt})"
              exit 0
            fi
            echo "Push failed (attempt ${attempt}/${MAX_RETRIES})"
            if [[ "$attempt" -lt "$MAX_RETRIES" ]]; then
              git pull --rebase
            fi
          done

          echo "::error::Failed to push after ${MAX_RETRIES} attempts"
          exit 1
