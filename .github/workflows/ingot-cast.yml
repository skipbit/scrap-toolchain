name: Ingot Cast

on:
  push:
    branches: [main]
    paths:
      - 'molds/**'
      - 'scripts/**'
      - 'schema/**'
      - 'platforms.toml'
  workflow_dispatch:
    inputs:
      mold_path:
        description: 'Mold path to build (e.g., molds/llvm/18.1.8)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: ingot-cast
  cancel-in-progress: false

jobs:
  detect-build-targets:
    runs-on: ubuntu-24.04
    outputs:
      has_build_targets: ${{ steps.detect.outputs.has_build_targets }}
      build_matrix: ${{ steps.detect.outputs.build_matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Detect build targets
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
          MOLD_PATH_INPUT: ${{ inputs.mold_path }}
        run: |
          set -euo pipefail

          no_targets() {
            {
              echo "has_build_targets=false"
              echo 'build_matrix={"include":[]}'
            } >> "$GITHUB_OUTPUT"
          }

          # === Step 1: Identify changed molds ===

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            # workflow_dispatch: use mold_path directly
            MOLD_PATH="${MOLD_PATH_INPUT%/}"
            if ! [[ "$MOLD_PATH" =~ ^molds/[a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+$ ]]; then
              echo "::error::Invalid mold path format: ${MOLD_PATH}"
              exit 1
            fi
            if [[ ! -f "${MOLD_PATH}/mold.toml" ]]; then
              echo "::error::Mold not found: ${MOLD_PATH}"
              exit 1
            fi
            CHANGED_MOLDS=("$MOLD_PATH")
          else
            # Push event: detect changes via git diff
            # Guard against null SHA on initial push
            NULL_SHA="0000000000000000000000000000000000000000"
            if [[ "$BEFORE_SHA" == "$NULL_SHA" ]]; then
              ALL_CHANGED_FILES=$(git ls-tree -r --name-only HEAD)
            else
              ALL_CHANGED_FILES=$(git diff --name-only "${BEFORE_SHA}..${CURRENT_SHA}" || true)
            fi

            if [[ -z "$ALL_CHANGED_FILES" ]]; then
              echo "No changes detected"
              no_targets
              exit 0
            fi

            # Check for infrastructure changes that affect all molds.
            # When build scripts, schema, or platform definitions change,
            # all existing build-type molds must be rebuilt to ensure
            # published ingots reflect the latest infrastructure.
            # Workflow files (.github/workflows/) are excluded — they
            # affect how builds run, not what is built. Same rationale
            # as pr-validation.yml.
            INFRA_CHANGED=$(echo "$ALL_CHANGED_FILES" | grep -E '^(schema/|scripts/|platforms\.toml$)' || true)

            # Extract mold-specific changes
            MOLD_CHANGED_FILES=$(echo "$ALL_CHANGED_FILES" | grep '^molds/' || true)

            if [[ -z "$INFRA_CHANGED" ]] && [[ -z "$MOLD_CHANGED_FILES" ]]; then
              echo "No relevant changes detected (no mold or infrastructure changes)"
              no_targets
              exit 0
            fi

            CHANGED_MOLDS=()

            # --- Infrastructure change: include ALL existing build-type molds ---
            if [[ -n "$INFRA_CHANGED" ]]; then
              echo "Infrastructure change detected:"
              echo "$INFRA_CHANGED" | while IFS= read -r f; do echo "  - $f"; done
              echo "All existing molds will be evaluated for rebuild."

              ALL_MOLD_DIRS=$(find molds -name "mold.toml" -not -path "*/\.*" 2>/dev/null \
                | sed 's|/mold\.toml$||' | sort -u || true)
              while IFS= read -r mold_dir; do
                [[ -z "$mold_dir" ]] && continue
                CHANGED_MOLDS+=("$mold_dir")
              done <<< "$ALL_MOLD_DIRS"
            fi

            # --- Mold-specific changes: add individually changed molds ---
            if [[ -n "$MOLD_CHANGED_FILES" ]]; then
              MOLD_DIRS=$(echo "$MOLD_CHANGED_FILES" \
                | sed 's|^\(molds/[^/]*/[^/]*\)/.*|\1|; s|^\(molds/[^/]*/[^/]*\)$|\1|' \
                | sort -u)

              # Source-change detection: skip metadata-only changes.
              # Only applies when INFRA_CHANGED is empty (infra changes
              # rebuild all molds regardless of their individual changes).
              if [[ -z "$INFRA_CHANGED" ]]; then
                CHECK_SCRIPT=$(mktemp)
                trap 'rm -f "$CHECK_SCRIPT"' EXIT
                cat > "$CHECK_SCRIPT" << 'CHECKEOF'
          import tomllib, subprocess, sys, os

          mold_dir = os.environ['MOLD_DIR_VAR']
          before_sha = os.environ['BEFORE_SHA_VAR']

          result = subprocess.run(
              ['git', 'show', f'{before_sha}:{mold_dir}/mold.toml'],
              capture_output=True, text=True
          )
          if result.returncode != 0:
              print('true')
              sys.exit(0)

          old = tomllib.loads(result.stdout)
          with open(f'{mold_dir}/mold.toml', 'rb') as f:
              new = tomllib.load(f)

          if (old.get('source') != new.get('source')
              or old.get('test') != new.get('test')
              or old.get('patches') != new.get('patches')):
              print('true')
          else:
              print('false')
          CHECKEOF

                while IFS= read -r mold_dir; do
                  [[ -z "$mold_dir" ]] && continue
                  [[ ! -f "${mold_dir}/mold.toml" ]] && continue

                  NEEDS_BUILD=false

                  if echo "$MOLD_CHANGED_FILES" | grep -q "^${mold_dir}/patches/"; then
                    NEEDS_BUILD=true
                  fi

                  if echo "$MOLD_CHANGED_FILES" | grep -q "^${mold_dir}/mold.toml$"; then
                    if [[ "$BEFORE_SHA" == "$NULL_SHA" ]]; then
                      NEEDS_BUILD=true
                    else
                      SOURCE_CHANGED=$(MOLD_DIR_VAR="$mold_dir" BEFORE_SHA_VAR="$BEFORE_SHA" python3 "$CHECK_SCRIPT")
                      if [[ "$SOURCE_CHANGED" == "true" ]]; then
                        NEEDS_BUILD=true
                      fi
                    fi
                  fi

                  if [[ "$NEEDS_BUILD" == "true" ]]; then
                    CHANGED_MOLDS+=("$mold_dir")
                  else
                    echo "Skipping ${mold_dir}: no source/patches changes"
                  fi
                done <<< "$MOLD_DIRS"
              else
                # INFRA_CHANGED is set — all molds already included above.
                # Individual mold changes are redundant (union is handled
                # by dedup below).
                :
              fi
            fi

            # Deduplicate (infra + individual mold changes may overlap)
            if [[ ${#CHANGED_MOLDS[@]} -gt 0 ]]; then
              mapfile -t CHANGED_MOLDS < <(printf '%s\n' "${CHANGED_MOLDS[@]}" | sort -u)
            fi
          fi

          if [[ ${#CHANGED_MOLDS[@]} -eq 0 ]]; then
            echo "No build targets detected"
            no_targets
            exit 0
          fi

          # === Step 2: Classify by source type ===
          # Fetch-type molds are validated in pr-validation.yml only.
          # Only build-type molds trigger ingot production here.

          HAS_BUILD=false
          BUILD_MOLD_DIRS=()

          for mold in "${CHANGED_MOLDS[@]}"; do
            SOURCE_TYPE=$(MOLD_VAR="$mold" python3 -c "
          import tomllib, os
          mold = os.environ['MOLD_VAR']
          with open(f'{mold}/mold.toml', 'rb') as f:
              data = tomllib.load(f)
          print(data['source']['type'])
          ")

            echo "Detected: ${mold} (${SOURCE_TYPE})"

            if [[ "$SOURCE_TYPE" == "fetch" ]]; then
              echo "::notice::Fetch type: ${mold} — validated in pr-validation.yml only"
            elif [[ "$SOURCE_TYPE" == "build" ]]; then
              HAS_BUILD=true
              BUILD_MOLD_DIRS+=("$mold")
              echo "::notice::Build type detected: ${mold}"
            fi
          done

          # === Step 3: Generate build matrix ===
          # Cross each build-type mold with its supported platforms.
          # If source.platforms.supported is specified, only those platforms are used.
          # Otherwise, all Tier 1 platforms from platforms.toml are used.
          # The matrix is consumed by cast-build-configure/make/package jobs.

          if [[ "$HAS_BUILD" == "true" ]]; then
            # Read Tier 1 platforms
            TIER1_PLATFORMS=$(python3 -c "
          import tomllib, json
          with open('platforms.toml', 'rb') as f:
              data = tomllib.load(f)
          for p in data['platforms']['tier1']:
              print(json.dumps(p))
          ")

            # Read glibc container mapping for container resolution
            GLIBC_MAP=$(python3 -c "
          import tomllib, json
          with open('platforms.toml', 'rb') as f:
              data = tomllib.load(f)
          print(json.dumps(data.get('glibc_containers', {})))
          ")

            BUILD_ENTRIES=()

            for mold in "${BUILD_MOLD_DIRS[@]}"; do
              # Read family, version, glibc_min from mold.toml
              MOLD_META=$(MOLD_VAR="$mold" python3 -c "
          import tomllib, json, os
          mold = os.environ['MOLD_VAR']
          with open(f'{mold}/mold.toml', 'rb') as f:
              data = tomllib.load(f)
          supported = data.get('source', {}).get('platforms', {}).get('supported', [])
          print(json.dumps({
              'family': data['metadata']['family'],
              'version': data['metadata']['version'],
              'glibc_min': data.get('source', {}).get('glibc_min', ''),
              'supported_platforms': supported
          }))
          ")

              FAMILY=$(echo "$MOLD_META" | jq -r '.family')
              VERSION=$(echo "$MOLD_META" | jq -r '.version')
              GLIBC_MIN=$(echo "$MOLD_META" | jq -r '.glibc_min')
              SUPPORTED_PLATFORMS=$(echo "$MOLD_META" | jq -r '.supported_platforms | if length > 0 then .[] else empty end')

              while IFS= read -r platform_entry; do
                [[ -z "$platform_entry" ]] && continue
                PLAT=$(echo "$platform_entry" | jq -r '.platform')
                ARCH=$(echo "$platform_entry" | jq -r '.arch')

                # Filter by mold's supported platforms if specified
                if [[ -n "$SUPPORTED_PLATFORMS" ]]; then
                  PLATFORM_ID="${PLAT}-${ARCH}"
                  if ! echo "$SUPPORTED_PLATFORMS" | grep -qx "$PLATFORM_ID"; then
                    echo "  Skip: ${mold} ${PLATFORM_ID} (not in source.platforms.supported)"
                    continue
                  fi
                fi
                RUNNER=$(echo "$platform_entry" | jq -r '.runner')
                CONTAINER=$(echo "$platform_entry" | jq -r '.container // ""')

                # Resolve container image for glibc compatibility (Linux only).
                # When glibc_min is specified, select the smallest glibc container
                # that satisfies the requirement. Otherwise use the default container
                # from platforms.toml (typically ubuntu:20.04 = glibc 2.31).
                if [[ -n "$GLIBC_MIN" && -n "$CONTAINER" && "$PLAT" == "linux" ]]; then
                  RESOLVED_CONTAINER=$(echo "$GLIBC_MAP" | GLIBC_MIN_VAR="$GLIBC_MIN" python3 -c "
          import json, sys, os
          glibc_min = os.environ['GLIBC_MIN_VAR']
          glibc_map = json.load(sys.stdin)
          default_container = glibc_map.get('default', {}).get('container', 'ubuntu:20.04') if isinstance(glibc_map.get('default'), dict) else 'ubuntu:20.04'
          candidates = []
          for ver, container in glibc_map.items():
              if ver == 'default' or not isinstance(container, str):
                  continue
              ver_tuple = tuple(int(x) for x in ver.split('.'))
              min_tuple = tuple(int(x) for x in glibc_min.split('.'))
              if ver_tuple >= min_tuple:
                  candidates.append((ver_tuple, container))
          if candidates:
              candidates.sort()
              print(candidates[0][1])
          else:
              print(default_container)
          ")
                  CONTAINER="$RESOLVED_CONTAINER"
                fi

                ENTRY=$(jq -n \
                  --arg mold "$mold" \
                  --arg family "$FAMILY" \
                  --arg version "$VERSION" \
                  --arg platform "$PLAT" \
                  --arg arch "$ARCH" \
                  --arg runner "$RUNNER" \
                  --arg container "$CONTAINER" \
                  '{mold: $mold, family: $family, version: $version,
                    platform: $platform, arch: $arch,
                    runner: $runner, container: $container}')
                BUILD_ENTRIES+=("$ENTRY")
                echo "  Matrix: ${mold} ${PLAT}-${ARCH} (runner: ${RUNNER}, container: ${CONTAINER:-native})"
              done <<< "$TIER1_PLATFORMS"
            done

            if [[ ${#BUILD_ENTRIES[@]} -eq 0 ]]; then
              echo "::warning::Build-type molds detected but no Tier 1 platform entries generated"
              HAS_BUILD=false
              BUILD_MATRIX='{"include":[]}'
            else
              BUILD_MATRIX=$(printf '%s\n' "${BUILD_ENTRIES[@]}" | jq -cs '{include: .}')
            fi
          else
            BUILD_MATRIX='{"include":[]}'
          fi

          echo "has_build_targets=${HAS_BUILD}" >> "$GITHUB_OUTPUT"
          echo "build_matrix=${BUILD_MATRIX}" >> "$GITHUB_OUTPUT"

  # ============================================================
  # Build stages: 3-stage splitting for source-build molds.
  #
  # Each stage runs cast-ingot.sh with CAST_STAGE set to the stage name.
  # Stages communicate via GitHub Actions artifacts (tar.gz).
  #
  # Stage 1 (configure): source download, SHA256, prerequisites, configure
  # Stage 2 (make):      make, make install
  # Stage 3 (package):   layout, license, metadata, archive, smoke test
  #
  # Linux builds run inside a Docker container (for glibc compatibility)
  # launched manually via `docker run` — NOT via the `container:` directive.
  # This allows host-level disk cleanup before the container starts, which
  # is necessary because GCC builds consume 30-50GB of disk space.
  # ============================================================

  cast-build-configure:
    needs: detect-build-targets
    if: needs.detect-build-targets.outputs.has_build_targets == 'true'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      matrix: ${{ fromJSON(needs.detect-build-targets.outputs.build_matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Maximize build space
        if: matrix.platform == 'linux'
        run: |
          echo "=== Disk usage before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/.ghcup
          sudo docker image prune -af 2>/dev/null || true
          echo "=== Disk usage after cleanup ==="
          df -h /

      - name: Run configure stage
        env:
          MOLD: ${{ matrix.mold }}
          PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
          CONTAINER: ${{ matrix.container }}
        run: |
          set -euo pipefail
          STAGE_DIR="${RUNNER_TEMP}/stage-artifacts"
          mkdir -p "${STAGE_DIR}"
          chmod +x scripts/cast-ingot.sh scripts/smoke-test.sh

          if [[ -n "${CONTAINER}" ]]; then
            docker run --rm \
              -v "${GITHUB_WORKSPACE}:/workspace" \
              -v "${STAGE_DIR}:/stage-artifacts" \
              -e CAST_STAGE=configure \
              -e STAGE_ARTIFACT_DIR=/stage-artifacts \
              -e MOLD_ARG="${MOLD}" \
              -e PLATFORM_ARG="${PLATFORM}" \
              -e ARCH_ARG="${ARCH}" \
              -w /workspace \
              "${CONTAINER}" \
              bash -c '
                set -euo pipefail
                apt-get update -qq
                apt-get install -y -qq --no-install-recommends \
                  sudo ca-certificates curl jq xz-utils \
                  file binutils python3 python3-pip \
                  make patch gcc g++ tar gzip
                python3 -c "import tomllib" 2>/dev/null || pip3 install tomli
                scripts/cast-ingot.sh "${MOLD_ARG}" "${PLATFORM_ARG}" "${ARCH_ARG}"
              '
          else
            CAST_STAGE=configure \
            STAGE_ARTIFACT_DIR="${STAGE_DIR}" \
              scripts/cast-ingot.sh "${MOLD}" "${PLATFORM}" "${ARCH}"
          fi

      - name: Upload configure stage artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage-configure-${{ matrix.family }}-${{ matrix.version }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/stage-artifacts/configure-tree.tar.gz
          retention-days: 3

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: logs-configure-${{ matrix.family }}-${{ matrix.version }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/stage-artifacts/*.log
          retention-days: 3

  cast-build-make:
    needs: [detect-build-targets, cast-build-configure]
    if: needs.detect-build-targets.outputs.has_build_targets == 'true'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 340
    strategy:
      matrix: ${{ fromJSON(needs.detect-build-targets.outputs.build_matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Maximize build space
        if: matrix.platform == 'linux'
        run: |
          echo "=== Disk usage before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/.ghcup
          sudo docker image prune -af 2>/dev/null || true
          echo "=== Disk usage after cleanup ==="
          df -h /

      - name: Download configure stage artifact
        uses: actions/download-artifact@v4
        with:
          name: stage-configure-${{ matrix.family }}-${{ matrix.version }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/stage-artifacts/

      - name: Run make stage
        env:
          MOLD: ${{ matrix.mold }}
          PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
          CONTAINER: ${{ matrix.container }}
        run: |
          set -euo pipefail
          STAGE_DIR="${RUNNER_TEMP}/stage-artifacts"
          chmod +x scripts/cast-ingot.sh scripts/smoke-test.sh

          if [[ -n "${CONTAINER}" ]]; then
            docker run --rm \
              -v "${GITHUB_WORKSPACE}:/workspace" \
              -v "${STAGE_DIR}:/stage-artifacts" \
              -e CAST_STAGE=make \
              -e STAGE_ARTIFACT_DIR=/stage-artifacts \
              -e MOLD_ARG="${MOLD}" \
              -e PLATFORM_ARG="${PLATFORM}" \
              -e ARCH_ARG="${ARCH}" \
              -w /workspace \
              "${CONTAINER}" \
              bash -c '
                set -euo pipefail
                apt-get update -qq
                apt-get install -y -qq --no-install-recommends \
                  sudo ca-certificates curl jq xz-utils \
                  file binutils python3 python3-pip \
                  make patch gcc g++ tar gzip
                python3 -c "import tomllib" 2>/dev/null || pip3 install tomli
                scripts/cast-ingot.sh "${MOLD_ARG}" "${PLATFORM_ARG}" "${ARCH_ARG}"
              '
          else
            CAST_STAGE=make \
            STAGE_ARTIFACT_DIR="${STAGE_DIR}" \
              scripts/cast-ingot.sh "${MOLD}" "${PLATFORM}" "${ARCH}"
          fi

      - name: Upload make stage artifact
        uses: actions/upload-artifact@v4
        with:
          name: stage-make-${{ matrix.family }}-${{ matrix.version }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/stage-artifacts/installed-tree.tar.gz
          retention-days: 3

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: logs-make-${{ matrix.family }}-${{ matrix.version }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/stage-artifacts/*.log
          retention-days: 3

  cast-build-package:
    needs: [detect-build-targets, cast-build-make]
    if: needs.detect-build-targets.outputs.has_build_targets == 'true'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      matrix: ${{ fromJSON(needs.detect-build-targets.outputs.build_matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Download make stage artifact
        uses: actions/download-artifact@v4
        with:
          name: stage-make-${{ matrix.family }}-${{ matrix.version }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/stage-artifacts/

      - name: Run package stage
        env:
          MOLD: ${{ matrix.mold }}
          PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
          CONTAINER: ${{ matrix.container }}
        run: |
          set -euo pipefail
          STAGE_DIR="${RUNNER_TEMP}/stage-artifacts"
          OUTPUT_DIR="${RUNNER_TEMP}/output"
          mkdir -p "${OUTPUT_DIR}"
          chmod +x scripts/cast-ingot.sh scripts/smoke-test.sh

          if [[ -n "${CONTAINER}" ]]; then
            docker run --rm \
              -v "${GITHUB_WORKSPACE}:/workspace" \
              -v "${STAGE_DIR}:/stage-artifacts" \
              -v "${OUTPUT_DIR}:/output" \
              -e CAST_STAGE=package \
              -e STAGE_ARTIFACT_DIR=/stage-artifacts \
              -e OUTPUT_DIR=/output \
              -e MOLD_ARG="${MOLD}" \
              -e PLATFORM_ARG="${PLATFORM}" \
              -e ARCH_ARG="${ARCH}" \
              -w /workspace \
              "${CONTAINER}" \
              bash -c '
                set -euo pipefail
                apt-get update -qq
                apt-get install -y -qq --no-install-recommends \
                  sudo ca-certificates curl jq xz-utils \
                  file binutils python3 python3-pip \
                  make patch gcc g++ tar gzip
                python3 -c "import tomllib" 2>/dev/null || pip3 install tomli
                scripts/cast-ingot.sh "${MOLD_ARG}" "${PLATFORM_ARG}" "${ARCH_ARG}"
              '
          else
            CAST_STAGE=package \
            STAGE_ARTIFACT_DIR="${STAGE_DIR}" \
            OUTPUT_DIR="${OUTPUT_DIR}" \
              scripts/cast-ingot.sh "${MOLD}" "${PLATFORM}" "${ARCH}"
          fi

      - name: Upload ingot artifact
        uses: actions/upload-artifact@v4
        with:
          name: ingot-${{ matrix.family }}-${{ matrix.version }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/output/
          retention-days: 3

  # upload-package: Consolidate build artifacts and publish to ghcr.io (OCI).
  #
  # Design:
  #   - Push each platform's ingot as a separate OCI artifact with a
  #     platform-specific tag (e.g., gcc:14.2.0-linux-x86_64)
  #   - Create an OCI Index manifest combining all platforms under the
  #     version tag (e.g., gcc:14.2.0)
  #   - Output package-manifest JSON for downstream index generation
  #   - Partial release prevention: skip molds missing any Tier 1 platform
  #
  # Dependency design:
  #   needs does NOT include cast-build-configure or cast-build-make.
  #   Intermediate stage failures propagate via GHA default behavior:
  #   cast-build-make failure -> cast-build-package skipped -> upload-package
  #   runs (via always()) but finds no artifacts -> per-mold completeness
  #   check skips the mold -> no partial release.
  upload-package:
    needs: [detect-build-targets, cast-build-package]
    if: |
      always()
      && needs.detect-build-targets.outputs.has_build_targets == 'true'
      && !contains(needs.*.result, 'failure')
      && !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up oras
        uses: oras-project/setup-oras@v1
        with:
          version: '1.2.2'

      - name: Log in to ghcr.io
        run: echo "${{ github.token }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Download all artifacts
        id: download
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: ingot-*
          merge-multiple: true
        continue-on-error: true

      - name: Push to ghcr.io and generate package manifests
        env:
          REGISTRY: ghcr.io/${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          MANIFEST_DIR="package-manifests"
          mkdir -p "$MANIFEST_DIR"

          # Collect all ingot-metadata JSON files.
          # When build stages were skipped (e.g., partial failure), there may
          # be no artifacts at all — handle gracefully.
          mkdir -p artifacts/
          mapfile -t METADATA_FILES < <(find artifacts/ -name 'ingot-metadata-*.json' -type f 2>/dev/null | sort)

          if [[ ${#METADATA_FILES[@]} -eq 0 ]]; then
            echo "::warning::No ingot metadata files found — build stages may have been skipped"
            echo ""
            echo "=== Summary: 0 pushed, 0 skipped, 0 failed ==="
            exit 0
          fi

          # Group metadata by family-version (newline-delimited for robustness)
          declare -A MOLD_META_FILES

          for meta_file in "${METADATA_FILES[@]}"; do
            FAMILY=$(jq -r '.family' "$meta_file")
            VERSION=$(jq -r '.version' "$meta_file")
            KEY="${FAMILY}/${VERSION}"
            MOLD_META_FILES["$KEY"]+="${meta_file}"$'\n'
          done

          # Read Tier 1 platform count (default for molds without source.platforms)
          TIER1_COUNT=$(python3 -c "
          import tomllib
          with open('platforms.toml', 'rb') as f:
              data = tomllib.load(f)
          print(len(data['platforms']['tier1']))
          ")

          PUSH_COUNT=0
          SKIP_COUNT=0
          FAILURE_COUNT=0

          mapfile -t SORTED_KEYS < <(printf '%s\n' "${!MOLD_META_FILES[@]}" | sort)
          for key in "${SORTED_KEYS[@]}"; do
            mapfile -t META_LIST <<< "${MOLD_META_FILES[$key]}"
            # Remove trailing empty element from trailing newline
            [[ -z "${META_LIST[-1]}" ]] && unset 'META_LIST[-1]'
            PLATFORM_COUNT=${#META_LIST[@]}

            # Determine expected platform count: intersect source.platforms.supported
            # with Tier 1 platforms. If source.platforms is omitted, use Tier 1 count.
            MOLD_DIR="molds/${key}"
            EXPECTED_COUNT=$(MOLD_VAR="$MOLD_DIR" python3 -c "
          import tomllib, os
          mold = os.environ['MOLD_VAR']
          with open(f'{mold}/mold.toml', 'rb') as f:
              mold_data = tomllib.load(f)
          with open('platforms.toml', 'rb') as f:
              plat_data = tomllib.load(f)
          tier1_ids = {f\"{p['platform']}-{p['arch']}\" for p in plat_data['platforms']['tier1']}
          supported = mold_data.get('source', {}).get('platforms', {}).get('supported', [])
          if supported:
              count = len(set(supported) & tier1_ids)
          else:
              count = len(tier1_ids)
          print(count)
          ")

            echo ""
            echo "=== Processing: ${key} (${PLATFORM_COUNT}/${EXPECTED_COUNT} platforms) ==="

            # Per-mold completeness check: skip if not all expected platforms present
            if [[ "$PLATFORM_COUNT" -lt "$EXPECTED_COUNT" ]]; then
              echo "::warning::Skipping ${key}: only ${PLATFORM_COUNT}/${EXPECTED_COUNT} platforms available"
              SKIP_COUNT=$((SKIP_COUNT + 1))
              continue
            fi

            FIRST_META="${META_LIST[0]}"
            FAMILY=$(jq -r '.family' "$FIRST_META")
            VERSION=$(jq -r '.version' "$FIRST_META")

            # Validate FAMILY and VERSION are non-empty and OCI-tag-safe
            if [[ -z "$FAMILY" || -z "$VERSION" ]]; then
              echo "::error::Empty family or version in metadata: ${FIRST_META}"
              FAILURE_COUNT=$((FAILURE_COUNT + 1))
              continue
            fi
            if ! [[ "$FAMILY" =~ ^[a-zA-Z0-9._-]+$ && "$VERSION" =~ ^[a-zA-Z0-9._-]+$ ]]; then
              echo "::error::Invalid family '${FAMILY}' or version '${VERSION}' for OCI tag"
              FAILURE_COUNT=$((FAILURE_COUNT + 1))
              continue
            fi

            # --- Determine OCI revision tag ---
            REPO_REF="${REGISTRY}/${FAMILY}"

            # List existing tags. A 404 (repository not yet created) is treated
            # as an empty list — this is the expected state for first-time push.
            if ! EXISTING_TAGS=$(oras repo tags "$REPO_REF" 2>/dev/null); then
              EXISTING_TAGS=""
            fi

            # Find the latest revision for this version.
            # Revision scheme: initial build uses bare version (e.g., 14.2.0),
            # which is implicitly revision 1. First rebuild is -r2, then -r3, etc.
            # Escape dots in VERSION for regex (14.2.0 -> 14\.2\.0)
            VERSION_RE="${VERSION//./\\.}"

            OCI_TAG="${VERSION}"
            if grep -qE "^${VERSION_RE}(-r[0-9]+)?$" <<< "$EXISTING_TAGS"; then
              LATEST_REV=0
              while IFS= read -r tag; do
                rev="${tag#"$VERSION"}"
                rev="${rev#-r}"
                [[ -z "$rev" ]] && rev=0
                (( rev > LATEST_REV )) && LATEST_REV=$rev
              done < <(grep -oE "^${VERSION_RE}(-r[0-9]+)?$" <<< "$EXISTING_TAGS")

              if [[ "$LATEST_REV" -eq 0 ]]; then
                # Base tag exists without revision suffix -> implicit r1 -> next is r2
                OCI_TAG="${VERSION}-r2"
              else
                NEXT_REV=$((LATEST_REV + 1))
                OCI_TAG="${VERSION}-r${NEXT_REV}"
              fi
            fi

            echo "OCI tag: ${FAMILY}:${OCI_TAG}"

            # --- Push each platform's ingot ---
            PUSH_FAILED=false
            ASSETS_JSON="[]"

            for meta_file in "${META_LIST[@]}"; do
              # Read all fields in a single jq call
              read -r PLATFORM ARCH INGOT_FILE GLIBC_VERSION < <(
                jq -r '[.platform, .arch, .ingot_file, (.glibc_version // "")] | @tsv' "$meta_file"
              )

              PLATFORM_TAG="${OCI_TAG}-${PLATFORM}-${ARCH}"

              # Find the ingot file in artifacts
              INGOT_PATH=$(find artifacts/ -name "$INGOT_FILE" -type f | head -1)
              if [[ -z "$INGOT_PATH" ]]; then
                echo "::error::Ingot file not found: ${INGOT_FILE}"
                PUSH_FAILED=true
                break
              fi

              echo "  Pushing: ${INGOT_FILE} -> ${REPO_REF}:${PLATFORM_TAG}"

              # Build annotation arguments
              ANNOTATIONS=(
                --annotation "org.opencontainers.image.title=${INGOT_FILE}"
                --annotation "org.skipbit.scrap.family=${FAMILY}"
                --annotation "org.skipbit.scrap.version=${VERSION}"
                --annotation "org.skipbit.scrap.platform=${PLATFORM}"
                --annotation "org.skipbit.scrap.arch=${ARCH}"
                --annotation "org.skipbit.scrap.source_type=build"
              )
              if [[ -n "$GLIBC_VERSION" ]]; then
                ANNOTATIONS+=(--annotation "org.skipbit.scrap.glibc_version=${GLIBC_VERSION}")
              fi

              # Push with retry (max 2 attempts).
              # Capture stdout (JSON) separately from stderr (progress/errors).
              PUSH_OUTPUT=""
              PUSH_EXIT=1
              PUSH_STDERR=""
              for attempt in 1 2; do
                PUSH_STDERR=$(mktemp)
                if PUSH_OUTPUT=$(oras push "${REPO_REF}:${PLATFORM_TAG}" \
                  --artifact-type "application/vnd.skipbit.scrap.ingot.v1+tar.xz" \
                  "${ANNOTATIONS[@]}" \
                  "${INGOT_PATH}:application/x-tar+xz" \
                  --format json 2>"$PUSH_STDERR"); then
                  PUSH_EXIT=0
                  rm -f "$PUSH_STDERR"
                  break
                fi
                PUSH_EXIT=$?
                if [[ "$attempt" -lt 2 ]]; then
                  echo "  Push failed (attempt ${attempt}), retrying..."
                  sleep 3
                fi
                rm -f "$PUSH_STDERR"
              done

              if [[ "$PUSH_EXIT" -ne 0 ]]; then
                echo "::error::Failed to push ${INGOT_FILE}"
                PUSH_FAILED=true
                break
              fi

              DIGEST=$(jq -r '.digest // empty' <<< "$PUSH_OUTPUT")
              if [[ -z "$DIGEST" ]]; then
                echo "::error::No digest in push output for ${INGOT_FILE}"
                PUSH_FAILED=true
                break
              fi
              echo "  Pushed: digest=${DIGEST}"

              # Build asset entry for package-manifest (including digest)
              ASSET_ENTRY=$(jq -n \
                --arg ingot_file "$INGOT_FILE" \
                --arg platform "$PLATFORM" \
                --arg arch "$ARCH" \
                --arg digest "$DIGEST" \
                '{ingot_file: $ingot_file, platform: $platform, arch: $arch, digest: $digest}')
              ASSETS_JSON=$(echo "$ASSETS_JSON" | jq --argjson entry "$ASSET_ENTRY" '. + [$entry]')
            done

            if [[ "$PUSH_FAILED" == "true" ]]; then
              echo "::error::Aborting ${key} due to push failure"
              FAILURE_COUNT=$((FAILURE_COUNT + 1))
              continue
            fi

            # --- Set package visibility to public ---
            # ghcr.io packages default to private. Attempt to set public visibility
            # after successful push. Try org endpoint first (most repos are org-owned),
            # then fall back to user endpoint. This requires appropriate token
            # permissions; if both fail, continue with a warning.
            echo "  Setting package visibility to public..."
            PKG_NAME="${GITHUB_REPOSITORY#*/}%2F${FAMILY}"
            OWNER="${GITHUB_REPOSITORY_OWNER}"
            if ! gh api --method PUT \
              "/orgs/${OWNER}/packages/container/${PKG_NAME}/visibility" \
              -f visibility=public 2>/dev/null; then
              if ! gh api --method PUT \
                "/user/packages/container/${PKG_NAME}/visibility" \
                -f visibility=public 2>/dev/null; then
                echo "::warning::Could not set package visibility to public for ${FAMILY}. Manual configuration may be required."
              fi
            fi

            # --- Create OCI Index for multi-architecture ---
            # The index allows OCI-native tools to resolve platform-specific
            # manifests from a single version tag. This is best-effort; the
            # per-platform tags remain usable even if index creation fails.
            echo "  Creating OCI Index: ${REPO_REF}:${OCI_TAG}"

            INDEX_SOURCES=()
            for meta_file in "${META_LIST[@]}"; do
              read -r p a < <(jq -r '[.platform, .arch] | @tsv' "$meta_file")
              INDEX_SOURCES+=("${REPO_REF}:${OCI_TAG}-${p}-${a}")
            done

            if ! oras manifest index create "${REPO_REF}:${OCI_TAG}" \
              "${INDEX_SOURCES[@]}" 2>&1; then
              echo "::warning::Failed to create OCI Index for ${key}; per-platform tags are still available"
            else
              echo "  OCI Index created"
            fi

            # --- Generate package-manifest JSON ---
            CREATED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            jq -n \
              --arg family "$FAMILY" \
              --arg version "$VERSION" \
              --arg oci_tag "${FAMILY}:${OCI_TAG}" \
              --argjson assets "$ASSETS_JSON" \
              --arg created_at "$CREATED_AT" \
              '{
                family: $family,
                version: $version,
                oci_tag: $oci_tag,
                assets: $assets,
                created_at: $created_at
              }' > "${MANIFEST_DIR}/package-manifest-${FAMILY}-${VERSION}.json"

            echo "  Package manifest written"
            PUSH_COUNT=$((PUSH_COUNT + 1))
          done

          echo ""
          echo "=== Summary: ${PUSH_COUNT} pushed, ${SKIP_COUNT} skipped, ${FAILURE_COUNT} failed ==="

          if [[ "$FAILURE_COUNT" -gt 0 ]]; then
            exit 1
          fi

      - name: Upload package manifests
        uses: actions/upload-artifact@v4
        with:
          name: package-manifest
          path: package-manifests/
          retention-days: 3
          if-no-files-found: warn
