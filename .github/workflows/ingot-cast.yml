name: Ingot Cast

on:
  push:
    branches: [main]
    paths: ['molds/**']
  workflow_dispatch:
    inputs:
      mold_path:
        description: 'Mold path to build (e.g., molds/llvm/18.1.8)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  detect-build-targets:
    runs-on: ubuntu-24.04
    outputs:
      has_build_targets: ${{ steps.detect.outputs.has_build_targets }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Detect build targets
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
          MOLD_PATH_INPUT: ${{ inputs.mold_path }}
        run: |
          set -euo pipefail

          no_targets() {
            {
              echo "has_build_targets=false"
            } >> "$GITHUB_OUTPUT"
          }

          # === Step 1: Identify changed molds ===

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            # workflow_dispatch: use mold_path directly (bypass DD-07)
            MOLD_PATH="${MOLD_PATH_INPUT%/}"
            if ! [[ "$MOLD_PATH" =~ ^molds/[a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+$ ]]; then
              echo "::error::Invalid mold path format: ${MOLD_PATH}"
              exit 1
            fi
            if [[ ! -f "${MOLD_PATH}/mold.toml" ]]; then
              echo "::error::Mold not found: ${MOLD_PATH}"
              exit 1
            fi
            CHANGED_MOLDS=("$MOLD_PATH")
          else
            # Push event: detect changes via git diff (DD-07)
            # Guard against null SHA on initial push
            NULL_SHA="0000000000000000000000000000000000000000"
            if [[ "$BEFORE_SHA" == "$NULL_SHA" ]]; then
              CHANGED_FILES=$(git ls-tree -r --name-only HEAD -- molds/)
            else
              CHANGED_FILES=$(git diff --name-only "${BEFORE_SHA}..${CURRENT_SHA}" -- molds/ || true)
            fi

            if [[ -z "$CHANGED_FILES" ]]; then
              echo "No mold changes detected"
              no_targets
              exit 0
            fi

            # Extract unique mold directories (molds/{family}/{version})
            MOLD_DIRS=$(echo "$CHANGED_FILES" \
              | sed 's|^\(molds/[^/]*/[^/]*\)/.*|\1|; s|^\(molds/[^/]*/[^/]*\)$|\1|' \
              | sort -u)

            # Write source-change-detection script to a temp file
            CHECK_SCRIPT=$(mktemp)
            trap 'rm -f "$CHECK_SCRIPT"' EXIT
            cat > "$CHECK_SCRIPT" << 'CHECKEOF'
          import tomllib, subprocess, sys, os

          mold_dir = os.environ['MOLD_DIR_VAR']
          before_sha = os.environ['BEFORE_SHA_VAR']

          result = subprocess.run(
              ['git', 'show', f'{before_sha}:{mold_dir}/mold.toml'],
              capture_output=True, text=True
          )
          if result.returncode != 0:
              print('true')
              sys.exit(0)

          old = tomllib.loads(result.stdout)
          with open(f'{mold_dir}/mold.toml', 'rb') as f:
              new = tomllib.load(f)

          if (old.get('source') != new.get('source')
              or old.get('test') != new.get('test')
              or old.get('patches') != new.get('patches')):
              print('true')
          else:
              print('false')
          CHECKEOF

            # DD-07: Filter to molds with source/patches changes only
            CHANGED_MOLDS=()
            while IFS= read -r mold_dir; do
              [[ -z "$mold_dir" ]] && continue
              [[ ! -f "${mold_dir}/mold.toml" ]] && continue

              NEEDS_BUILD=false

              # Check if patches/ changed
              if echo "$CHANGED_FILES" | grep -q "^${mold_dir}/patches/"; then
                NEEDS_BUILD=true
              fi

              # Check if mold.toml changed and source/test sections differ
              if echo "$CHANGED_FILES" | grep -q "^${mold_dir}/mold.toml$"; then
                if [[ "$BEFORE_SHA" == "$NULL_SHA" ]]; then
                  NEEDS_BUILD=true
                else
                  SOURCE_CHANGED=$(MOLD_DIR_VAR="$mold_dir" BEFORE_SHA_VAR="$BEFORE_SHA" python3 "$CHECK_SCRIPT")
                  if [[ "$SOURCE_CHANGED" == "true" ]]; then
                    NEEDS_BUILD=true
                  fi
                fi
              fi

              if [[ "$NEEDS_BUILD" == "true" ]]; then
                CHANGED_MOLDS+=("$mold_dir")
              else
                echo "Skipping ${mold_dir}: no source/patches changes (DD-07)"
              fi
            done <<< "$MOLD_DIRS"
          fi

          if [[ ${#CHANGED_MOLDS[@]} -eq 0 ]]; then
            echo "No build targets detected"
            no_targets
            exit 0
          fi

          # === Step 2: Classify by source type ===
          # ADR-0035: fetch-type molds no longer produce artifacts in CI.
          # Only build-type molds trigger ingot production (TSK-0003).

          HAS_BUILD=false

          for mold in "${CHANGED_MOLDS[@]}"; do
            SOURCE_TYPE=$(MOLD_VAR="$mold" python3 -c "
          import tomllib, os
          mold = os.environ['MOLD_VAR']
          with open(f'{mold}/mold.toml', 'rb') as f:
              data = tomllib.load(f)
          print(data['source']['type'])
          ")

            echo "Detected: ${mold} (${SOURCE_TYPE})"

            if [[ "$SOURCE_TYPE" == "fetch" ]]; then
              echo "::notice::Fetch type: ${mold} — validated in pr-validation.yml only (ADR-0035)"
            elif [[ "$SOURCE_TYPE" == "build" ]]; then
              HAS_BUILD=true
              echo "::notice::Build type detected: ${mold} (deferred to TSK-0003)"
            fi
          done

          echo "has_build_targets=${HAS_BUILD}" >> "$GITHUB_OUTPUT"

  # upload-package: Consolidate artifacts and publish to ghcr.io (OCI).
  #
  # Design intent (DSN-0004 DD-10):
  #   Partial release prevention is handled by per-mold completeness checks
  #   within this job's steps.
  #
  # ADR-0035: fetch-type ingot production removed. cast-fetch job deleted.
  # TSK-0003: build-type pipeline (cast-build-*) will be added here.
  # Until TSK-0003 is implemented, this job is disabled.
  upload-package:
    needs: [detect-build-targets]
    # Disabled until build-type pipeline is implemented (TSK-0003).
    if: false
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: ingot-*

      - name: Process releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          MANIFEST_DIR="package-manifests"
          mkdir -p "$MANIFEST_DIR"

          # Collect all ingot-metadata JSON files
          mapfile -t METADATA_FILES < <(find artifacts/ -name 'ingot-metadata-*.json' -type f | sort)

          if [[ ${#METADATA_FILES[@]} -eq 0 ]]; then
            echo "::error::No ingot metadata files found"
            exit 1
          fi

          # Group metadata by family-version using associative arrays
          declare -A MOLD_META_FILES

          for meta_file in "${METADATA_FILES[@]}"; do
            FAMILY=$(jq -r '.family' "$meta_file")
            VERSION=$(jq -r '.version' "$meta_file")
            KEY="${FAMILY}/${VERSION}"
            MOLD_META_FILES["$KEY"]+="${meta_file} "
          done

          # Read Tier 1 platform count for completeness check
          TIER1_COUNT=$(python3 -c "
          import tomllib
          with open('platforms.toml', 'rb') as f:
              data = tomllib.load(f)
          print(len(data['platforms']['tier1']))
          ")

          RELEASE_COUNT=0
          FAILURE_COUNT=0

          for key in "${!MOLD_META_FILES[@]}"; do
            read -ra META_LIST <<< "${MOLD_META_FILES[$key]}"
            PLATFORM_COUNT=${#META_LIST[@]}

            echo ""
            echo "=== Processing: ${key} (${PLATFORM_COUNT}/${TIER1_COUNT} platforms) ==="

            # Per-mold completeness check (DD-10)
            if [[ "$PLATFORM_COUNT" -lt "$TIER1_COUNT" ]]; then
              echo "::warning::Skipping ${key}: only ${PLATFORM_COUNT}/${TIER1_COUNT} platforms (DD-10)"
              continue
            fi

            # Extract family and version from first metadata file
            FIRST_META="${META_LIST[0]}"
            FAMILY=$(jq -r '.family' "$FIRST_META")
            VERSION=$(jq -r '.version' "$FIRST_META")

            # TODO (TSK-0003/TSK-0009): Implement oras push to ghcr.io
            # Replace gh release create with oras push (ADR-0037).
            echo "::notice::Build-type publishing via oras push is not yet implemented"
            RELEASE_COUNT=$((RELEASE_COUNT + 1))
          done

          echo ""
          echo "=== Summary: ${RELEASE_COUNT} release(s) processed, ${FAILURE_COUNT} failure(s) ==="

          if [[ "$FAILURE_COUNT" -gt 0 ]]; then
            exit 1
          fi

      - name: Upload package manifests
        uses: actions/upload-artifact@v4
        with:
          name: package-manifest
          path: package-manifests/
          retention-days: 3
          if-no-files-found: warn
