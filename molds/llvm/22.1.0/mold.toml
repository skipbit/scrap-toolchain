[metadata]
schema_version = 1
family = "llvm"
version = "22.1.0"
status = "active"
license = "Apache-2.0 WITH LLVM-exception"
license_files = ["LICENSE.TXT"]
homepage = "https://llvm.org"
description = "LLVM toolchain (Clang, LLD, libc++)"

[metadata.components]
compiler = "clang"

[source]
type = "fetch"
glibc_min = "2.34"

[[source.binaries]]
platform = "linux"
arch = "x86_64"
url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.0/LLVM-22.1.0-Linux-X64.tar.xz"
sha256 = "8d662e425e46c48b45f5f970770b5e37f323607c8c2cbc371593fc9c4ba1e7b3"

[[source.binaries]]
platform = "linux"
arch = "aarch64"
url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.0/LLVM-22.1.0-Linux-ARM64.tar.xz"
sha256 = "e3b4205fe45d5561dec9d46465873a79c26b25b028b310515b38c34f668c6aec"

[[source.binaries]]
platform = "darwin"
arch = "aarch64"
url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.0/LLVM-22.1.0-macOS-ARM64.tar.xz"
sha256 = "cd5e615f4dab23d0239359cd343202c5f6ceeaf072c245a3c685d73afac09646"

[test]
hello_world_source = """
#include <iostream>
int main() {
    std::cout << "Hello, scrap!" << std::endl;
    return 0;
}
"""
compile_command = "{compiler}++ -std=c++23 -fuse-ld=lld -o hello hello.cpp"
expected_output = "Hello, scrap!\n"
