[platforms]
schema_version = 1

# === Tier 1: Official binaries & full support ===

[[platforms.tier1]]
platform = "linux"
arch = "x86_64"
runner = "ubuntu-24.04"
container = "ubuntu:20.04"                # glibc 2.31 baseline
description = "Linux x86_64 (glibc 2.31+)"

[[platforms.tier1]]
platform = "linux"
arch = "aarch64"
runner = "ubuntu-24.04-arm"
container = "ubuntu:20.04"                # glibc 2.31 baseline
description = "Linux aarch64 (glibc 2.31+)"

[[platforms.tier1]]
platform = "darwin"
arch = "aarch64"
runner = "macos-14"
description = "macOS Apple Silicon"

# glibc version to container image mapping for Linux platforms.
# When a mold specifies source.glibc_min, the pipeline selects the
# container that satisfies the requirement.
[glibc_containers]
"2.31" = "ubuntu:20.04"
"2.34" = "ubuntu:22.04"
"2.35" = "ubuntu:22.04"
"2.38" = "ubuntu:24.04"

[glibc_containers.default]
container = "ubuntu:20.04"
glibc_version = "2.31"

# === Tier 2: Source build only ===

[[platforms.tier2]]
platform = "darwin"
arch = "x86_64"
source_build_only = true
description = "macOS Intel (source build only)"
